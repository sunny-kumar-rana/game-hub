<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Games</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Audiowide&family=Poppins:ital,wght@0,300;0,500;0,700;1,100;1,200;1,400;1,500;1,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Game Hub</h1>

    <div class="menu">
      <div class="game-card" onclick="loadGame('snake')">
        <img src="images/snake.png" alt="Snake" />
        <p>Snake</p>
      </div>

      <div class="game-card" onclick="loadGame('sudoku')">
        <img src="images/sudoku.png" alt="Sudoku" />
        <p>Sudoku</p>
      </div>

      <div class="game-card" onclick="loadGame('tictactoe')">
        <img src="images/tictactoe.png" alt="Tic Tac Toe" />
        <p>Tic Tac Toe</p>
      </div>

      <div class="game-card" onclick="loadGame('puzzle')">
        <img src="images/puzzle.png" alt="Puzzle" />
        <p>Puzzle</p>
      </div>
    </div>

    <div id="game-container"></div>

    <script src="script.js"></script>
  </body>
</html>
